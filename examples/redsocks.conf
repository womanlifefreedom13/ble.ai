// redsocks.conf — transparent TCP redirect to the local SOCKS5 (tunnel entry).
//
// Install on the Iran VPS:    apt install redsocks
// Then add iptables rules to redirect outgoing TCP into redsocks:
//
//   iptables -t nat -N REDSOCKS
//   iptables -t nat -A REDSOCKS -d 127.0.0.0/8     -j RETURN
//   iptables -t nat -A REDSOCKS -d 10.0.0.0/8      -j RETURN
//   iptables -t nat -A REDSOCKS -d 172.16.0.0/12   -j RETURN
//   iptables -t nat -A REDSOCKS -d 192.168.0.0/16  -j RETURN
//   # Bypass Iranian targets (optional, requires geoip):
//   #   iptables -t nat -A REDSOCKS -m geoip --dst-cc IR -j RETURN
//   iptables -t nat -A REDSOCKS -p tcp -j REDIRECT --to-ports 12345
//   iptables -t nat -A OUTPUT    -p tcp -j REDSOCKS
//
// Verify:  curl ifconfig.me  → should return your EXIT server's IP.

base {
    log_debug = off;
    log_info  = on;
    log       = "syslog:daemon";
    daemon    = on;
    redirector = iptables;
}

redsocks {
    local_ip   = 127.0.0.1;
    local_port = 12345;

    ip   = 127.0.0.1;
    port = 1080;
    type = socks5;
}
